<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do Apps — Task Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/forms.css" />
</head>
<body data-page="tasks">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo"><i data-lucide="layers"></i></div>
        <div class="sidebar-brand-text"><h2>To Do Apps</h2><span>Task Planner</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="my-tasks.html" class="sidebar-link" data-page="tasks"><i data-lucide="list-checks"></i><span>Daftar Task</span></a>
        <a href="analytics.html" class="sidebar-link" data-page="analytics"><i data-lucide="bar-chart-3"></i><span>Statistik</span></a>
        <a href="user.html" class="sidebar-link" data-page="user"><i data-lucide="user-round"></i><span>User</span></a>
      </nav>
      <div class="sidebar-user-section">
        <div class="user-switcher-area"></div>
      </div>
      <div class="sidebar-bottom">
        <a href="create-task.html" class="sidebar-new-task active" style="background:var(--primary);"><i data-lucide="plus-circle"></i><span>Task Baru</span></a>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header class="top-header">
      <h1 class="top-header-title" id="pageTitleDesktop">Task Baru</h1>
      <div class="top-header-actions"><div class="avatar avatar-initials">-</div></div>
    </header>

    <header class="mobile-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-hamburger" id="mobileHamburger"><i data-lucide="menu"></i></button>
        <a href="my-tasks.html" class="icon-btn" aria-label="Close"><i data-lucide="x"></i></a>
        <span class="mobile-topbar-title" id="pageTitleMobile">Task Baru</span>
      </div>
      <button class="btn-ghost" id="draftBtn" style="color:var(--primary);">Draf</button>
    </header>

    <main class="app-main">
      <div class="form-page animate-fade-in">
        <input type="text" class="form-title-input" id="taskTitle" placeholder="Apa yang perlu dikerjakan?" autofocus maxlength="120" />
        <hr class="form-divider" />

        <div class="form-group">
          <label class="form-label"><i data-lucide="file-text" style="width:18px;height:18px;"></i> Deskripsi</label>
          <textarea class="form-textarea" id="taskDesc" placeholder="Tambahkan detail, tautan, atau catatan..." rows="4"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label"><i data-lucide="flag" style="width:18px;height:18px;"></i> Prioritas</label>
          <div class="priority-selector" id="prioritySelector">
            <button class="priority-pill" data-priority="Low">Low</button>
            <button class="priority-pill active" data-priority="Medium">Medium</button>
            <button class="priority-pill" data-priority="High">High</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i data-lucide="calendar" style="width:18px;height:18px;"></i> Deadline</label>
          <input type="date" id="taskDeadline" style="width:100%;padding:var(--sp-md);border:1px solid var(--outline-variant);border-radius:var(--r-md);font:var(--body-lg);background:var(--surface-container-lowest);outline:none;transition:border-color var(--t-fast);" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor=''" />
        </div>

        <div class="form-float-submit">
          <button class="btn-primary" id="submitBtn" style="width:100%;padding:16px;">
            <i data-lucide="plus-circle" style="width:20px;height:20px;" id="submitIcon"></i> <span id="submitLabel">Simpan Task</span>
          </button>
        </div>
      </div>
    </main>

    <nav class="mobile-bottomnav">
      <div class="bottomnav-inner">
        <a href="index.html" class="bottomnav-item" data-page="dashboard"><div class="bottomnav-icon-wrap"><i data-lucide="home"></i></div><span>Beranda</span></a>
        <a href="my-tasks.html" class="bottomnav-item active" data-page="tasks"><div class="bottomnav-icon-wrap"><i data-lucide="list-checks"></i></div><span>Task</span></a>
        <a href="analytics.html" class="bottomnav-item" data-page="analytics"><div class="bottomnav-icon-wrap"><i data-lucide="bar-chart-3"></i></div><span>Statistik</span></a>
        <a href="user.html" class="bottomnav-item" data-page="user"><div class="bottomnav-icon-wrap"><i data-lucide="user-round"></i></div><span>User</span></a>
      </div>
    </nav>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/user-switcher.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/create-task.js"></script>
</body>
</html>
