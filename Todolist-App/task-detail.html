<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina To Do — Task Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/detail.css" />
</head>
<body data-page="tasks">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo"><i data-lucide="layers"></i></div>
        <div class="sidebar-brand-text"><h2>Lumina To Do</h2><span>Task Planner</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="my-tasks.html" class="sidebar-link" data-page="tasks"><i data-lucide="list-checks"></i><span>Daftar Task</span></a>
        <a href="analytics.html" class="sidebar-link" data-page="analytics"><i data-lucide="bar-chart-3"></i><span>Statistik</span></a>
        <a href="user.html" class="sidebar-link" data-page="user"><i data-lucide="user-round"></i><span>User</span></a>
      </nav>
      <div class="sidebar-user-section">
        <div class="user-switcher-area"></div>
      </div>
      <div class="sidebar-bottom">
        <a href="create-task.html" class="sidebar-new-task"><i data-lucide="plus-circle"></i><span>Task Baru</span></a>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header class="top-header">
      <h1 class="top-header-title">Detail Task</h1>
      <div class="top-header-actions"><div class="avatar avatar-initials">-</div></div>
    </header>

    <header class="mobile-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-hamburger" id="mobileHamburger"><i data-lucide="menu"></i></button>
        <a href="my-tasks.html" class="icon-btn" aria-label="Back"><i data-lucide="arrow-left"></i></a>
        <span class="mobile-topbar-title">Detail Task</span>
      </div>
      <a href="#" class="icon-btn" aria-label="Edit" id="mobileEditLink"><i data-lucide="pencil"></i></a>
    </header>

    <main class="app-main" id="detailContent">
      <div style="text-align:center;padding:80px 16px;color:var(--on-surface-variant);">
        <i data-lucide="loader-2" style="width:48px;height:48px;display:block;margin:0 auto 12px;animation:spin 1s linear infinite;"></i>
        <p>Memuat task...</p>
      </div>
    </main>

    <nav class="mobile-bottomnav">
      <div class="bottomnav-inner">
        <a href="index.html" class="bottomnav-item" data-page="dashboard"><div class="bottomnav-icon-wrap"><i data-lucide="home"></i></div><span>Beranda</span></a>
        <a href="my-tasks.html" class="bottomnav-item active" data-page="tasks"><div class="bottomnav-icon-wrap"><i data-lucide="list-checks"></i></div><span>Task</span></a>
        <a href="analytics.html" class="bottomnav-item" data-page="analytics"><div class="bottomnav-icon-wrap"><i data-lucide="bar-chart-3"></i></div><span>Statistik</span></a>
        <a href="user.html" class="bottomnav-item" data-page="user"><div class="bottomnav-icon-wrap"><i data-lucide="user-round"></i></div><span>User</span></a>
      </div>
    </nav>

    <a href="create-task.html" class="fab" aria-label="Create new task"><i data-lucide="plus"></i></a>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/user-switcher.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/task-detail.js"></script>
</body>
</html>
