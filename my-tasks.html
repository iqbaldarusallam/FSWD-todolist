<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina To Do — My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/design-system.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body data-page="tasks">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo"><i data-lucide="layers"></i></div>
        <div class="sidebar-brand-text"><h2>Lumina To Do</h2><span>Task Planner</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <a href="my-tasks.html" class="sidebar-link active" data-page="tasks"><i data-lucide="list-checks"></i><span>Daftar Task</span></a>
        <a href="analytics.html" class="sidebar-link" data-page="analytics"><i data-lucide="bar-chart-3"></i><span>Statistik</span></a>
        <a href="user.html" class="sidebar-link" data-page="user"><i data-lucide="user-round"></i><span>User</span></a>
      </nav>
      <div class="sidebar-user-section">
        <div class="user-switcher-area"></div>
      </div>
      <div class="sidebar-bottom">
        <a href="create-task.html" class="sidebar-new-task"><i data-lucide="plus-circle"></i><span>Task Baru</span></a>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header class="top-header">
      <h1 class="top-header-title">Daftar Task</h1>
      <div class="top-header-actions">
        <div class="search-bar"><i data-lucide="search" style="width:18px;height:18px;"></i><input type="text" placeholder="Cari task..." id="searchInput" /></div>
        <div class="avatar avatar-initials">-</div>
      </div>
    </header>

    <header class="mobile-topbar mobile-topbar-simple">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-hamburger" id="mobileHamburger"><i data-lucide="menu"></i></button>
        <div class="avatar avatar-initials" style="width:32px;height:32px;font-size:11px;">-</div>
        <span class="mobile-topbar-title">Daftar Task</span>
      </div>
    </header>

    <main class="app-main">
      <section class="welcome-section animate-fade-in">
        <h2 class="welcome-greeting" style="font:var(--headline-xl);">Daftar Task</h2>
        <p class="welcome-role profile-role-display" id="taskSubtitle">Memuat...</p>
      </section>

      <section class="base-card task-composer-panel animate-fade-in" style="margin-bottom: var(--sp-lg);">
        <div class="panel-head">
          <div class="panel-icon"><i data-lucide="square-pen"></i></div>
          <div>
            <p class="panel-eyebrow">Tambah Cepat</p>
            <h3>Tulis Tugas Baru</h3>
          </div>
        </div>
        <form id="quickTaskForm" class="quick-form">
          <label class="mission-label" for="quickTaskTitle">Judul Task</label>
          <input type="text" id="quickTaskTitle" class="quick-input" placeholder="Contoh: Laporan penjualan Q3" maxlength="120" />
          <label class="mission-label" for="quickTaskInput">Deskripsi (optional)</label>
          <textarea id="quickTaskInput" placeholder="Detail atau catatan tambahan..." maxlength="300"></textarea>
          <div class="quick-form-fields">
            <div>
              <label class="mission-label" for="quickTaskPriority">Prioritas</label>
              <select id="quickTaskPriority">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
              </select>
            </div>
            <div>
              <label class="mission-label" for="quickTaskDeadline">Deadline</label>
              <input type="date" id="quickTaskDeadline" />
            </div>
          </div>
          <button type="submit" class="btn-primary quick-form-submit">
            <i data-lucide="send"></i>
            Tambahkan
          </button>
        </form>
      </section>

      <section class="filter-bar animate-fade-in">
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">Semua</button>
          <button class="filter-tab" data-filter="active">Aktif</button>
          <button class="filter-tab" data-filter="completed">Selesai</button>
        </div>
      </section>

      <section class="task-list-container stagger" id="taskList"></section>

      <section class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-state-icon"><i data-lucide="clipboard-list"></i></div>
        <h3>Belum ada task</h3>
        <p>Buat task pertama untuk mulai bekerja.</p>
        <a href="create-task.html" class="btn-primary"><i data-lucide="plus-circle" style="width:18px;height:18px;"></i> Task Baru</a>
      </section>
    </main>

    <nav class="mobile-bottomnav">
      <div class="bottomnav-inner">
        <a href="index.html" class="bottomnav-item" data-page="dashboard"><div class="bottomnav-icon-wrap"><i data-lucide="home"></i></div><span>Beranda</span></a>
        <a href="my-tasks.html" class="bottomnav-item active" data-page="tasks"><div class="bottomnav-icon-wrap"><i data-lucide="list-checks"></i></div><span>Task</span></a>
        <a href="analytics.html" class="bottomnav-item" data-page="analytics"><div class="bottomnav-icon-wrap"><i data-lucide="bar-chart-3"></i></div><span>Statistik</span></a>
        <a href="user.html" class="bottomnav-item" data-page="user"><div class="bottomnav-icon-wrap"><i data-lucide="user-round"></i></div><span>User</span></a>
      </div>
    </nav>

    <a href="create-task.html" class="fab" aria-label="Create new task"><i data-lucide="plus"></i></a>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="assets/js/user-switcher.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/tasks.js"></script>
</body>
</html>
